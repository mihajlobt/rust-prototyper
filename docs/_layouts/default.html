<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description | escape }}">
  <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <a class="gh-link" href="https://github.com/mihajlobt/rust-prototyper" target="_blank" rel="noopener">GitHub ↗</a>
  </header>

  <div class="layout">
    {% include sidebar.html %}

    <main class="content">
      <article class="page">
        {{ content }}
      </article>
    </main>
  </div>

  <footer class="site-footer">
    <p>{{ site.title }} · Last updated {{ site.time | date: "%Y-%m-%d" }}</p>
  </footer>
</body>
</html>
