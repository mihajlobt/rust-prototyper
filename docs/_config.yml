# Jekyll configuration for Prototyper docs
# Deployed via Cloudflare Pages — auto-publishes on every push to master.
# Update `url` once your Cloudflare Pages project name is chosen.

title: Prototyper Docs
description: Architecture, plans, and specs for the Prototyper Tauri desktop app
baseurl: ""
url: https://rust-prototyper.pages.dev

# Use a custom layout (no theme dependency)
theme: null
plugins: []

# Source: ./docs
source: .

# Build settings
permalink: /:basename/
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Files/dirs to exclude from the build
exclude:
  - api/
  - headless-tree/
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .bundle/
  - node_modules/

# Treat .json files inside context/ as static (don't try to process them)
include:
  - context/

# Don't copy these to the build
keep_files: []

# Default front matter
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default
  # Apply layout to context/ files that have no front matter
  - scope:
      path: "context"
    values:
      layout: default
